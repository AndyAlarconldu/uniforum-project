name: PROD Deploy - Voting Service

on:
  pull_request:
    types: [closed]
    branches: [prod]  

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Clonar código
        uses: actions/checkout@v3

      - name: Instalar dependencias de Python
        run: |
          pip install -r uniforum-backend/voting-service/requirements.txt

      - name: Login en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/voting-service:latest uniforum-backend/voting-service
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-service:latest

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_VOTING }} 
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/voting-service:latest
            sudo docker stop voting-service || true
            sudo docker rm voting-service || true
            sudo docker run -d -p 8006:8006 --name voting-service ${{ secrets.DOCKER_USERNAME }}/voting-service:latest
