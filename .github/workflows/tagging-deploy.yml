name: PROD Deploy - Tagging Service

on:
  pull_request:
    types: [closed]
    branches: [prod]  

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Clonar código
        uses: actions/checkout@v3

      - name: Instalar dependencias de Python
        run: |
          pip install -r uniforum-backend/tagging-service/requirements.txt

      - name: Login en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tagging-service:latest uniforum-backend/tagging-service
          docker push ${{ secrets.DOCKER_USERNAME }}/tagging-service:latest

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_TAGGING }}  
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/tagging-service:latest
            docker stop tagging-service || true
            docker rm tagging-service || true
            docker run -d -p 8007:8007 --name tagging-service ${{ secrets.DOCKER_USERNAME }}/tagging-service:latest
