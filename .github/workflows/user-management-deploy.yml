name: PROD Deploy - User Management Domain

on:
  pull_request:
    types: [closed]
    branches: [prod]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Login en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Java Services
      - name: Build & Push auth-service-final
        run: |
          cd uniforum-backend/user-management-domain/auth-service-final
          chmod +x mvnw
          ./mvnw clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

      - name: Build & Push authorization-service
        run: |
          cd uniforum-backend/user-management-domain/authorization-service
          chmod +x mvnw
          ./mvnw clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest

      - name: Build & Push registro-usuarios-correcto
        run: |
          cd uniforum-backend/user-management-domain/registro-usuarios-correcto
          chmod +x mvnw
          ./mvnw clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/registro-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/registro-service:latest

      # Python Services
      - name: Build & Push perfil-service
        run: |
          cd uniforum-backend/user-management-domain/perfil-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/perfil-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/perfil-service:latest

      - name: Build & Push password-service
        run: |
          cd uniforum-backend/user-management-domain/password-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/password-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/password-service:latest

      - name: Build & Push notification-service
        run: |
          cd uniforum-backend/user-management-domain/notification-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

      # ---------- Despliegue en EC2 ----------
      - name: Deploy en EC2 - User Management Domain
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_DISCUSSION }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker network inspect uniforum-net >/dev/null 2>&1 || sudo docker network create uniforum-net
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
            sudo docker stop auth-service || true && sudo docker rm auth-service || true
            sudo docker run -d -p 8082:8082 --name auth-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest
            sudo docker stop authorization-service || true && sudo docker rm authorization-service || true
            sudo docker run -d -p 8083:8083 --name authorization-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/registro-service:latest
            sudo docker stop registro-service || true && sudo docker rm registro-service || true
            sudo docker run -d -p 8081:8081 --name registro-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/registro-service:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/perfil-service:latest
            sudo docker stop perfil-service || true && sudo docker rm perfil-service || true
            sudo docker run -d -p 8000:8000 --name perfil-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/perfil-service:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/password-service:latest
            sudo docker stop password-service || true && sudo docker rm password-service || true
            sudo docker run -d -p 8002:8002 --name password-service --network uniforum-net -e RABBITMQ_HOST=rabbitmq ${{ secrets.DOCKER_USERNAME }}/password-service:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/notification-service:latest
            sudo docker stop notification-service || true && sudo docker rm notification-service || true
            sudo docker run -d -p 8001:8001 --name notification-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

            sudo docker stop notification-consumer || true && sudo docker rm notification-consumer || true
            sudo docker run -d --name notification-consumer --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/notification-service:latest python start_consumer.py

            sudo docker run -d --name rabbitmq --network uniforum-net -p 5672:5672 -p 15672:15672 rabbitmq:3-management
