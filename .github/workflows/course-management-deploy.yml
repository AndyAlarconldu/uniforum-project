name: PROD Deploy - Course Management Domain

on:
  pull_request:
    types: [closed]
    branches: [prod]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Login en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push Python microservicios
      - name: Build & Push course-service (Python)
        run: |
          cd uniforum-backend/course-management-domain/course-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/course-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/course-service:latest

      - name: Build & Push enrollment-service (Python)
        run: |
          cd uniforum-backend/course-management-domain/enrollment-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/enrollment-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/enrollment-service:latest

      # Build & Push Node.js microservicios
      - name: Build & Push academic-schedule-service (Node.js)
        run: |
          cd uniforum-backend/course-management-domain/academic-schedule-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/academic-schedule-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/academic-schedule-service:latest

      - name: Build & Push course-forum-link-service (Node.js)
        run: |
          cd uniforum-backend/course-management-domain/course-forum-link-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/course-forum-link-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/course-forum-link-service:latest

      # Despliegue en EC2
      - name: Desplegar en EC2 - Course Management Domain
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_TAGGING }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker network inspect uniforum-net >/dev/null 2>&1 || sudo docker network create uniforum-net

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/course-service:latest
            sudo docker stop course-service || true && sudo docker rm course-service || true
            sudo docker run -d -p 8009:8009 --name course-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/course-service:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/enrollment-service:latest
            sudo docker stop enrollment-service || true && sudo docker rm enrollment-service || true
            sudo docker run -d -p 8010:8010 --name enrollment-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/enrollment-service:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/course-forum-link-service:latest
            sudo docker stop course-forum-link-service || true && sudo docker rm course-forum-link-service || true
            sudo docker run -d -p 8011:8011 --name course-forum-link-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/course-forum-link-service:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/academic-schedule-service:latest
            sudo docker stop academic-schedule-service || true && sudo docker rm academic-schedule-service || true
            sudo docker run -d -p 8012:8012 --name academic-schedule-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/academic-schedule-service:latest
