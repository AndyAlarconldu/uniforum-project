name: PROD Deploy - Reply Service

on:
  pull_request:
    types: [closed]
    branches: [prod]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Clonar código
        uses: actions/checkout@v3

      - name: Instalar dependencias
        run: |
          pip install -r uniforum-backend/reply-service/requirements.txt

      - name: Login en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/reply-service:latest uniforum-backend/reply-service
          docker push ${{ secrets.DOCKER_USERNAME }}/reply-service:latest

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_REPLY }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/reply-service:latest
            docker stop reply-service || true
            docker rm reply-service || true
            docker run -d -p 8003:8003 --name reply-service ${{ secrets.DOCKER_USERNAME }}/reply-service:latest
