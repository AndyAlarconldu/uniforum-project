name: PROD Deploy - User Management Domain

on:
  pull_request:
    types: [closed]
    branches: [qa]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Login en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ----------- JAVA SERVICES -----------
      - name: Build & Push auth-service-final
        run: |
          cd uniforum-backend/user-management-domain/auth-service-final
          chmod +x mvnw
          ./mvnw clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

      - name: Build & Push authorization-service
        run: |
          cd uniforum-backend/user-management-domain/authorization-service
          chmod +x mvnw
          ./mvnw clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest

      - name: Build & Push registro-usuarios
        run: |
          cd uniforum-backend/user-management-domain/registro-usuarios-correcto
          chmod +x mvnw
          ./mvnw clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/registro-usuarios:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/registro-usuarios:latest

      # ----------- PYTHON SERVICES -----------
      - name: Build & Push perfil-service
        run: |
          cd uniforum-backend/user-management-domain/perfil-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/perfil-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/perfil-service:latest

      - name: Build & Push notification-service
        run: |
          cd uniforum-backend/user-management-domain/notification-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

      - name: Build & Push password-service
        run: |
          cd uniforum-backend/user-management-domain/password-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/password-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/password-service:latest

      # ----------- DEPLOY EN EC2 -----------
      - name: Desplegar en EC2 - User Management Domain
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_DISCUSSION }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Crear red Docker (si no existe)
            docker network inspect uniforum-net >/dev/null 2>&1 || docker network create uniforum-net

            # Desplegar RabbitMQ dentro de la red
            docker pull rabbitmq:3-management
            docker stop rabbitmq || true && docker rm rabbitmq || true
            docker run -d --name rabbitmq \
              --network uniforum-net \
              -p 5672:5672 -p 15672:15672 \
              rabbitmq:3-management

            # Desplegar password-service (usa RabbitMQ)
            docker pull ${{ secrets.DOCKER_USERNAME }}/password-service:latest
            docker stop password-service || true && docker rm password-service || true
            docker run -d -p 8002:8002 \
              --name password-service \
              --network uniforum-net \
              -e RABBITMQ_HOST=rabbitmq \
              ${{ secrets.DOCKER_USERNAME }}/password-service:latest

            # Resto de servicios (sin RabbitMQ)
            docker pull ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
            docker stop auth-service || true && docker rm auth-service || true
            docker run -d -p 8082:8082 --name auth-service ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

            docker pull ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest
            docker stop authorization-service || true && docker rm authorization-service || true
            docker run -d -p 8083:8083 --name authorization-service ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest

            docker pull ${{ secrets.DOCKER_USERNAME }}/registro-usuarios:latest
            docker stop registro-usuarios || true && docker rm registro-usuarios || true
            docker run -d -p 8081:8081 --name registro-usuarios ${{ secrets.DOCKER_USERNAME }}/registro-usuarios:latest

            docker pull ${{ secrets.DOCKER_USERNAME }}/perfil-service:latest
            docker stop perfil-service || true && docker rm perfil-service || true
            docker run -d -p 8000:8000 --name perfil-service ${{ secrets.DOCKER_USERNAME }}/perfil-service:latest

            docker pull ${{ secrets.DOCKER_USERNAME }}/notification-service:latest
            docker stop notification-service || true && docker rm notification-service || true
            docker run -d -p 8001:8001 --name notification-service ${{ secrets.DOCKER_USERNAME }}/notification-service:latest
