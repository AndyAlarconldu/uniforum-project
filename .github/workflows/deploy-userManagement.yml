name: QA Deploy - User Management Domain

on:
  pull_request:
    types: [closed]
    branches: [qa]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Login en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---- Build & Push ----
      - name: Build & Push auth-service-final
        run: |
          cd uniforum-backend/user-management-domain/auth-service-final
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/auth-service-final:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service-final:latest

      - name: Build & Push authorization-service
        run: |
          cd uniforum-backend/user-management-domain/authorization-service
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest

      - name: Build & Push registro-usuarios-correcto
        run: |
          cd uniforum-backend/user-management-domain/registro-usuarios-correcto
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/registro-usuarios-correcto:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/registro-usuarios-correcto:latest

      - name: Build & Push user-service
        run: |
          cd uniforum-backend/user-management-domain/user-service
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      # ---- Deploy remoto ----
      - name: Desplegar en EC2 - User Management Domain
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_USER_MANAGEMENT }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker network inspect uniforum-net >/dev/null 2>&1 || sudo docker network create uniforum-net

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/auth-service-final:latest
            sudo docker stop auth-service-final || true && sudo docker rm auth-service-final || true
            sudo docker run -d -p 8082:8082 --name auth-service-final --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/auth-service-final:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest
            sudo docker stop authorization-service || true && sudo docker rm authorization-service || true
            sudo docker run -d -p 8083:8083 --name authorization-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/authorization-service:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/registro-usuarios-correcto:latest
            sudo docker stop registro-usuarios-correcto || true && sudo docker rm registro-usuarios-correcto || true
            sudo docker run -d -p 8081:8081 --name registro-usuarios-correcto --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/registro-usuarios-correcto:latest

            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/user-service:latest
            sudo docker stop user-service || true && sudo docker rm user-service || true
            sudo docker run -d -p 8030:8030 --name user-service --network uniforum-net ${{ secrets.DOCKER_USERNAME }}/user-service:latest
