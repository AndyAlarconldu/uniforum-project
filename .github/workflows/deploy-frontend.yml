name: QA Deploy - Frontend

on:
  pull_request:
    types: [closed]
    branches: [qa]

jobs:
  deploy-frontend:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Instalar dependencias
        run: |
          cd frontend
          npm install

      - name: Construir frontend
        run: |
          cd frontend
          npm run build

      - name: Copiar archivos a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_FRONTEND }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_2 }}
          source: "frontend/dist/*"
          target: "/var/www/html"

      - name: Reiniciar Nginx en EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_FRONTEND }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_2 }}
          script: |
            sudo systemctl restart nginx
